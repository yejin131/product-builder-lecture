<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 6/45 행운 번호 추천기</title>
    <meta name="description" content="AI 스타일의 깔끔하고 현대적인 로또 6/45 행운의 번호 추천 웹사이트. 한 번에 5세트의 중복 없는 당첨 번호를 생성해보세요.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="app-container">
        <header class="app-header">
            <div class="header-top">
                <div class="badge"><i class="fa-solid fa-clover"></i> LUCKY LOTTO</div>
                <div class="header-actions">
                    <button id="header-contact-btn" class="icon-btn" title="제휴 문의" aria-label="제휴 문의">
                        <i class="fa-solid fa-handshake"></i>
                    </button>
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="테마 전환" title="다크/라이트 모드 전환">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
            </div>
            <h1>로또 번호 추천기</h1>
            <p>오늘의 행운을 담아 중복 없는 번호 5세트를 생성합니다.</p>
        </header>

        <section class="action-section">
            <button id="generate-btn" class="btn btn-primary">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>번호 생성하기 (5세트)</span>
            </button>
            <button id="copy-all-btn" class="btn btn-secondary" title="생성된 모든 번호 복사">
                <i class="fa-regular fa-copy"></i>
                <span>전체 복사</span>
            </button>
        </section>

        <section class="results-section" id="results-container">
            <!-- 5개 세트 카드가 JavaScript에 의해 동적으로 생성됩니다 -->
            <div class="placeholder-card">
                <i class="fa-solid fa-dice-five placeholder-icon"></i>
                <p>위의 '번호 생성하기' 버튼을 눌러 행운의 번호를 확인해보세요!</p>
            </div>
        </section>

        <footer class="app-footer">
            <p>본 번호는 무작위로 추출되며 당첨을 보장하지 않습니다.</p>
            <div class="footer-links">
                <button id="open-contact-btn" class="footer-btn">
                    <i class="fa-solid fa-handshake"></i> 제휴 문의
                </button>
            </div>
        </footer>
    </main>

    <!-- 제휴 문의 모달 -->
    <div id="contact-modal" class="modal" aria-hidden="true">
        <div class="modal-overlay" id="modal-overlay"></div>
        <div class="modal-container">
            <button id="modal-close-btn" class="modal-close-btn" aria-label="닫기">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="modal-header">
                <div class="modal-badge"><i class="fa-solid fa-handshake"></i> PARTNERSHIP</div>
                <h2>제휴 및 비즈니스 문의</h2>
                <p>프로젝트 제휴 및 비즈니스 관련 문의를 남겨주시면 빠르게 답변해 드립니다.</p>
            </div>
            <form id="partnership-form" action="https://formspree.io/f/xojglgan" method="POST" class="contact-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="contact-name"><i class="fa-regular fa-user"></i> 이름 / 회사명 <span class="required">*</span></label>
                        <input type="text" id="contact-name" name="name" placeholder="홍길동 (또는 주식회사 OO)" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-email"><i class="fa-regular fa-envelope"></i> 회신 이메일 <span class="required">*</span></label>
                        <input type="email" id="contact-email" name="email" placeholder="example@company.com" required>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="contact-phone"><i class="fa-solid fa-phone"></i> 연락처</label>
                        <input type="tel" id="contact-phone" name="phone" placeholder="010-0000-0000">
                    </div>
                    <div class="form-group">
                        <label for="contact-category"><i class="fa-solid fa-layer-group"></i> 문의 유형</label>
                        <select id="contact-category" name="category">
                            <option value="광고/마케팅 제휴">광고/마케팅 제휴</option>
                            <option value="서비스/콘텐츠 제휴">서비스/콘텐츠 제휴</option>
                            <option value="사업 및 기술 협력">사업 및 기술 협력</option>
                            <option value="기타 문의">기타 문의</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="contact-message"><i class="fa-regular fa-comment-dots"></i> 문의 내용 <span class="required">*</span></label>
                    <textarea id="contact-message" name="message" rows="4" placeholder="제휴 제안 내용 및 상세 문의 사항을 작성해 주세요." required></textarea>
                </div>
                <div id="form-status" class="form-status"></div>
                <button type="submit" id="submit-btn" class="btn btn-primary btn-submit">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span>문의하기</span>
                </button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">번호가 클립보드에 복사되었습니다!</div>

    <script src="main.js"></script>
</body>
</html>
